outputDir: ../../public/assets/packs
defaultActivePack: default
sampleSprites:
  - ../../public/assets/sprites/wumpus.bmp
  - ../../public/assets/sprites/futter.bmp
  - ../../public/assets/sprites/trinken.bmp
  - ../../public/assets/sprites/baum.bmp
  - ../../public/assets/sprites/heu.bmp
  - ../../public/assets/sprites/mouse.bmp
assets:
  - id: wumpus_male
    sourceFile: ../../public/assets/sprites/wumpus.bmp
    outputFile: sprites/wumpus.png
    kind: spritesheet
    category: character
    width: 28
    height: 84
    frameWidth: 28
    frameHeight: 28
    frameCount: 3
    frameDirection: vertical
    promptHint: Main creature with clear silhouette and 3-frame walk cycle.
    metadata:
      phaserKey: wumpus_male
  - id: wumpus_female
    sourceFile: ../../public/assets/sprites/wumpine.bmp
    outputFile: sprites/wumpine.png
    kind: spritesheet
    category: character
    width: 28
    height: 84
    frameWidth: 28
    frameHeight: 28
    frameCount: 3
    frameDirection: vertical
    promptHint: Female variant in same family, clear frame continuity.
    metadata:
      phaserKey: wumpus_female
  - id: wumpus_child
    sourceFile: ../../public/assets/sprites/wumpling.bmp
    outputFile: sprites/wumpling.png
    kind: spritesheet
    category: character
    width: 28
    height: 84
    frameWidth: 28
    frameHeight: 28
    frameCount: 3
    frameDirection: vertical
    promptHint: Child variant, cute but still readable at tiny size.
    metadata:
      phaserKey: wumpus_child
  - id: resource_food
    sourceFile: ../../public/assets/sprites/futter.bmp
    outputFile: sprites/futter.png
    kind: image
    category: resource
    width: 36
    height: 76
    promptHint: Food resource icon with compact silhouette.
    metadata:
      phaserKey: resource-food
  - id: resource_water
